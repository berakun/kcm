<body class="min-h-screen flex flex-col items-center overflow-x-hidden">
<!-- Top Hero Section -->
<div class="relative w-full h-[40vh] md:h-[45vh] overflow-hidden">
<div class="absolute inset-0 bg-cover bg-center" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBT4VqcBNFcxdoSxuqnnYvQ95rnHPbgjiOA1yR_Ay-89ZGjBFOMXlPZfmrrwPpbqYtVSX_ahLsLomQ6-HCGl6YDJyMW5KBp20_mJ3--tdV7TGB0LkiR5UiHvbA0LkRaTkrsXhWpENBFUeyonIS_6_LRtHfwpTuPpfnbOYLoyvbGno5ePLOqCRpsVpwU9BMPA6ShD1oAvqYG6i7-FaA9GSnpdj-QMsYQvtTWAIonmtGtKCQQWnzJSqNkjA');"></div>
<div class="absolute inset-0 hero-gradient"></div>
<!-- Top Left Logo -->
<div class="absolute top-margin-mobile left-margin-mobile flex items-center gap-2">
<div class="w-10 h-10 rounded-full bg-white flex items-center justify-center shadow-md">
<span class="font-bold text-primary text-title-lg">KCM</span>
</div>
</div>
<!-- Bottom Left Text -->
<div class="absolute bottom-6 left-margin-mobile right-margin-mobile text-white">
<h1 class="font-display-lg-mobile text-display-lg-mobile mb-1">Kurnia Cipta Mandiri</h1>
<p class="font-body-md text-body-md opacity-90">Ingin interior murah? KCM solusinya</p>
</div>
</div>
<!-- Login Form Section -->
<div class="w-full max-w-md bg-surface flex-grow px-margin-mobile py-stack-lg -mt-4 relative rounded-t-[2rem] shadow-2xl">
<div class="text-center md:text-left mb-stack-lg pt-4">
<h2 class="font-headline-sm text-headline-sm text-on-surface mb-1">Selamat Datang</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Masuk ke akun Anda</p>
</div>
<form class="space-y-stack-md" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-stack-sm">
<label class="font-label-md text-label-md text-on-surface-variant block ml-1">Email</label>
<div class="relative flex items-center border border-outline-variant rounded-xl bg-white px-4 py-3 input-focus transition-all">
<span class="material-symbols-outlined text-outline mr-3">mail</span>
<input class="w-full bg-transparent border-none focus:ring-0 p-0 text-body-md text-on-surface outline-none" placeholder="contoh@email.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-stack-sm">
<label class="font-label-md text-label-md text-on-surface-variant block ml-1">Password</label>
<div class="relative flex items-center border border-outline-variant rounded-xl bg-white px-4 py-3 input-focus transition-all">
<span class="material-symbols-outlined text-outline mr-3">lock</span>
<input class="w-full bg-transparent border-none focus:ring-0 p-0 text-body-md text-on-surface outline-none" id="passwordInput" placeholder="••••••••" required="" type="password"/>
<button class="ml-2 flex items-center text-outline-variant hover:text-primary transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="passwordIcon">visibility</span>
</button>
</div>
</div>
<!-- Links Row -->
<div class="flex items-center justify-between py-1">
<label class="flex items-center cursor-pointer group">
<div class="relative flex items-center">
<input class="peer h-5 w-5 cursor-pointer appearance-none rounded border border-outline-variant transition-all checked:bg-primary checked:border-primary focus:ring-0" type="checkbox"/>
<span class="material-symbols-outlined absolute text-white opacity-0 peer-checked:opacity-100 transition-opacity left-0 right-0 text-center text-sm pointer-events-none" style="font-variation-settings: 'wght' 700;">check</span>
</div>
<span class="ml-2 font-label-md text-label-md text-on-surface-variant group-hover:text-on-surface transition-colors">Ingat saya</span>
</label>
<a class="font-label-md text-label-md text-primary font-semibold hover:opacity-80 transition-opacity" href="#">Lupa password?</a>
</div>
<!-- Main Action Button -->
<button class="w-full bg-primary-container text-on-primary font-title-lg text-title-lg py-4 rounded-xl shadow-lg hover:shadow-xl active:scale-[0.98] transition-all duration-200 mt-4 flex justify-center items-center gap-2" type="submit">
                Masuk
            </button>
</form>
<!-- Divider -->
<div class="relative my-stack-lg flex items-center">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="px-4 font-caption text-caption text-outline uppercase tracking-widest">atau</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Secondary Action Button -->
<button class="w-full border-2 border-primary text-primary font-title-lg text-title-lg py-4 rounded-xl hover:bg-primary/5 transition-all duration-200 mb-stack-lg">
            Masuk sebagai Guest
        </button>
<!-- Footer -->
<footer class="mt-auto pt-stack-lg text-center">
<p class="font-caption text-caption text-on-surface-variant">
                © 2025 Kurnia Cipta Mandiri. All rights reserved.
            </p>
</footer>
</div>
<script>
        function togglePassword() {
            const input = document.getElementById('passwordInput');
            const icon = document.getElementById('passwordIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility';
            }
        }

        // Simple button interaction feedback
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('touchstart', function() {
                this.classList.add('opacity-80');
            });
            btn.addEventListener('touchend', function() {
                this.classList.remove('opacity-80');
            });
        });
    </script>
